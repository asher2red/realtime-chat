<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
</head>
<body>

<input type="text" id="message">
<button onclick="sendMessage()">전송</button>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>

    const socket = new SockJS('http://localhost:8080/chat');

    const stompClient = Stomp.over(socket);

    const token = "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ0ZXN0MiIsImlhdCI6MTc3ODkxNDM3MywiZXhwIjoxNzc4OTE3OTczfQ.QT86-nL9uzBs76c7eNRmr2R5NI_WYNqoH_5-vrKso_s";

    const roomId = prompt("방 번호 입력");

    const messagesDiv =
        document.getElementById('messages');

    fetch('http://localhost:8080/chat/room/' + roomId)
        .then(response => response.json())
        .then(messages => {

            messages.forEach(message => {

                const div = document.createElement('div');

                div.innerText = message.sender + " : " + message.message;

                messagesDiv.appendChild(div);
            })
        })

    stompClient.connect({
        Authorization: "Bearer " + token,
        roomId: roomId
    }, function () {

        console.log("연결 성공");

        stompClient.subscribe('/topic/room/' + roomId, function (message) {

            const body = JSON.parse(message.body);

            const li = document.createElement('li');

            li.innerText =
                body.sender + ": " + body.message;

            messagesDiv.appendChild(li);
        });
    });

    function sendMessage() {

        const input =
            document.getElementById('message');

        stompClient.send(
            "/app/chat/" + roomId,
            {},
            JSON.stringify({
                roomId: roomId,
                message: input.value
            })
        );

        input.value = "";
    }

</script>

</body>
</html>
