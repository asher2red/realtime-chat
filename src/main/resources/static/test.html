<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
</head>
<body>

<input id="username" placeholder="아이디">

<input id="password" type="password" placeholder="비밀번호">

<input id="roomId" placeholder="방 번호">

<button onClick="login()">
    로그인
</button>

<hr>

<input id="message" placeholder="메시지 입력">

<button onClick="sendMessage()">
    전송
</button>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>

    let stompClient = null;
    let token = null;

    const messagesDiv =
        document.getElementById('messages');

    async function login() {

        const username = document.getElementById('username').value;

        const password = document.getElementById('password').value;

        const roomId = document.getElementById('roomId').value;

        const response = await
        fetch('http://localhost:8080/users/login',
            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({username, password})
            }
        );

        const result = await response.json();
        token = result.data;

        connect(roomId);
    }

    function connect(roomId) {

        const socket = new SockJS('http://localhost:8080/chat');

        stompClient = Stomp.over(socket);

        stompClient.connect(
            {
                Authorization: 'Bearer ' + token,
                roomId: roomId
            },

            function(frame) {

                console.log('Connected: ' + frame);

                loadMessages(roomId);

                stompClient.subscribe('/topic/room/' + roomId,

                    function(message) {
                        const body = JSON.parse(message.body);

                        appendMessage(body.sender + " : " + body.message);
                    }
                )
            }
        )
    }

    async function loadMessages(roomId) {

        const response = await fetch('http://localhost:8080/chat/room/' + roomId);

        const messages = await response.json();

        messages.forEach(message => {

            appendMessage(
                message.sender + " : " + message.message
            );
        });
    }

    function appendMessage(text) {

        const div =
            document.createElement(
                'div'
            );

        div.innerText = text;

        messages.appendChild(
            div
        );
    }

    function sendMessage() {

        const roomId = document.getElementById('roomId').value;

        const input =
            document.getElementById('message');

        stompClient.send(
            "/app/chat/" + roomId,
            {},
            JSON.stringify({
                roomId: roomId,
                message: input.value
            })
        );

        input.value = "";
    }

</script>

</body>
</html>
